services:
  # ==========================================
  # 1. VPN & DOWNLOAD LAYER
  # ==========================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WG_ADDRESSES}
      - SERVER_CITIES=${VPN_CITY}
    ports:
      - 8080:8080 
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun" 
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - /opt/media/config/qbittorrent:/config
      - ${ROOT_DIR}:/data 
    restart: unless-stopped
    depends_on:
      - gluetun

  # ==========================================
  # 2. INDEXER & AUTOMATION LAYER
  # ==========================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/media/config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/media/config/sonarr:/config
      - ${ROOT_DIR}:/data 
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/media/config/radarr:/config
      - ${ROOT_DIR}:/data 
    ports:
      - 7878:7878
    restart: unless-stopped

  # ==========================================
  # 3. MEDIA SERVER LAYER
  # ==========================================
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/media/config/jellyfin:/config
      - ${ROOT_DIR}/media:/data/media 
    ports:
      - 8096:8096
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host 
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
    volumes:
      - /opt/media/config/plex:/config
      - ${ROOT_DIR}/media:/data/media 
    restart: unless-stopped

  # ==========================================
  # 4. DISCOVERY & REQUEST LAYER
  # ==========================================
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - 5055:5055
    volumes:
      - /opt/media/config/jellyseerr:/app/config
    restart: unless-stopped
